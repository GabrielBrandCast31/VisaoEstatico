<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Diagnóstico gratuito — Visão</title>
  <meta name="description" content="5 perguntas pra descobrir seu perfil financeiro." />
  <link rel="icon" href="assets/img/logo.png" />
  <link rel="apple-touch-icon" href="assets/img/logo.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://unpkg.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat&family=Inter:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/css/tailwind.build.css" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body class="font-body">
  <div class="relative min-h-screen overflow-hidden bg-canvas">
    <svg viewBox="0 0 600 600" aria-hidden class="pointer-events-none absolute -left-40 -top-40 h-[640px] w-[640px] opacity-30">
      <defs><radialGradient id="orb-qz1" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="var(--primary-light)" stop-opacity="0.55"></stop><stop offset="100%" stop-color="var(--primary-light)" stop-opacity="0"></stop></radialGradient></defs>
      <g fill="none" stroke="var(--primary-light)" stroke-width="0.8" opacity="0.55" transform="rotate(-12 300 300)"><ellipse cx="300" cy="300" rx="280" ry="120"></ellipse><ellipse cx="300" cy="300" rx="220" ry="92" opacity="0.7"></ellipse><ellipse cx="300" cy="300" rx="160" ry="66" opacity="0.5"></ellipse><ellipse cx="300" cy="300" rx="100" ry="42" opacity="0.35"></ellipse></g>
      <circle cx="300" cy="300" r="220" fill="url(#orb-qz1)" opacity="0.45"></circle>
    </svg>
    <svg viewBox="0 0 600 600" aria-hidden class="pointer-events-none absolute -right-40 bottom-0 h-[520px] w-[520px] opacity-20">
      <defs><radialGradient id="orb-qz2" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="var(--support)" stop-opacity="0.55"></stop><stop offset="100%" stop-color="var(--support)" stop-opacity="0"></stop></radialGradient></defs>
      <g fill="none" stroke="var(--support)" stroke-width="0.8" opacity="0.55" transform="rotate(-12 300 300)"><ellipse cx="300" cy="300" rx="280" ry="120"></ellipse><ellipse cx="300" cy="300" rx="220" ry="92" opacity="0.7"></ellipse><ellipse cx="300" cy="300" rx="160" ry="66" opacity="0.5"></ellipse><ellipse cx="300" cy="300" rx="100" ry="42" opacity="0.35"></ellipse></g>
      <circle cx="300" cy="300" r="220" fill="url(#orb-qz2)" opacity="0.45"></circle>
    </svg>

    <header class="relative border-b border-edge-light/60 bg-canvas/80 backdrop-blur-xl">
      <div class="mx-auto w-full max-w-6xl px-5 sm:px-8 flex h-16 items-center justify-between">
        <a href="index.html" class="flex items-center"><img src="assets/img/logo.png" alt="Visão" class="h-9 w-auto select-none" /></a>
        <a href="index.html" class="font-human text-sm text-mute hover:text-fg">← Voltar</a>
      </div>
    </header>

    <main class="relative px-5 py-14 sm:py-20">
      <div id="quiz-root"></div>
    </main>
  </div>

  <div id="cookie-banner" class="hidden fixed inset-x-4 bottom-4 z-50 mx-auto max-w-3xl translate-y-24 opacity-0 transition-all duration-300" role="dialog" aria-live="polite">
    <div class="flex flex-col gap-4 rounded-2xl border border-edge-light bg-card/95 p-5 shadow-vision-card backdrop-blur sm:flex-row sm:items-center sm:justify-between sm:p-6">
      <p class="font-body text-sm text-mute sm:text-base">A gente usa cookies para entender o que funciona na página. <a href="politica-privacidade.html" class="text-support hover:text-accent">Política de Privacidade</a>.</p>
      <div class="flex shrink-0 gap-2">
        <button data-cookie-reject class="inline-flex items-center justify-center gap-2 rounded-pill font-heading font-semibold transition-all duration-200 bg-transparent text-fg hover:bg-card px-4 py-2 text-sm">Recusar</button>
        <button data-cookie-accept class="inline-flex items-center justify-center gap-2 rounded-pill font-heading font-semibold transition-all duration-200 bg-accent text-ink hover:-translate-y-0.5 hover:shadow-glow-yellow shadow-vision-soft px-4 py-2 text-sm">Aceitar</button>
      </div>
    </div>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/submit.js"></script>
  <script src="assets/js/pdf.js"></script>
  <script src="assets/js/quiz.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
